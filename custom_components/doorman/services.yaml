create_user:
  fields:
    name:
      required: true
      selector:
        text:
    enabled:
      required: false
      selector:
        boolean:
    pin:
      required: false
      selector:
        text:
          type: password
    card:
      required: false
      selector:
        text:
    code:
      required: false
      selector:
        text:
    valid_from:
      required: false
      selector:
        datetime:
    valid_to:
      required: false
      selector:
        datetime:
    device:
      required: false
      selector:
        config_entry:
          integration: doorman

update_user:
  fields:
    uuid:
      required: true
      selector:
        text:
    name:
      required: false
      selector:
        text:
    enabled:
      required: false
      selector:
        boolean:
    pin:
      required: false
      selector:
        text:
          type: password
    card:
      required: false
      selector:
        text:
    code:
      required: false
      selector:
        text:
    valid_from:
      required: false
      selector:
        datetime:
    valid_to:
      required: false
      selector:
        datetime:
    device:
      required: false
      selector:
        config_entry:
          integration: doorman

delete_user:
  fields:
    uuid:
      required: true
      selector:
        text:
    device:
      required: false
      selector:
        config_entry:
          integration: doorman

grant_access:
  fields:
    access_point_id:
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 32
          mode: box
    user_uuid:
      required: false
      selector:
        text:
    device:
      required: false
      selector:
        config_entry:
          integration: doorman
