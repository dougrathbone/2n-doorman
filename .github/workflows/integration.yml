name: Integration Tests (Supervisor)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual trigger for debugging

jobs:
  integration:
    name: Run against real HA instance
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test runner dependencies
        run: pip install aiohttp pytest pytest-asyncio websockets podman-compose

      - name: Build and start services
        run: |
          podman-compose -f tests/integration/docker-compose.yml up -d --build
          echo "Services started — waiting for health checks..."

      - name: Wait for Home Assistant to be ready
        run: |
          echo "Polling HA onboarding endpoint..."
          timeout 300 bash -c \
            'until curl -sf http://localhost:8123/api/onboarding > /dev/null; do sleep 5; echo "Waiting..."; done'
          echo "HA is ready."

      - name: Wait for mock 2N servers to be ready
        run: |
          timeout 30 bash -c \
            'until curl -sf http://localhost:8888/api/system/info > /dev/null; do sleep 2; done'
          echo "Mock 2N leader server is ready."
          timeout 30 bash -c \
            'until curl -sf http://localhost:8889/api/system/info > /dev/null; do sleep 2; done'
          echo "Mock 2N follower server is ready."

      - name: Run integration tests
        env:
          HA_URL: http://localhost:8123
          MOCK_2N_URL: http://localhost:8888
          # HA inside the container reaches the mock servers via the pod network
          MOCK_2N_HOST: mock-2n
          MOCK_2N_PORT: "8888"
          MOCK_2N_FOLLOWER_URL: http://localhost:8889
          MOCK_2N_FOLLOWER_HOST: mock-2n-follower
          MOCK_2N_FOLLOWER_PORT: "8888"
        run: pytest tests/integration/ -v --tb=short --asyncio-mode=auto

      - name: Dump HA logs on failure
        if: failure()
        run: podman-compose -f tests/integration/docker-compose.yml logs homeassistant

      - name: Dump mock 2N logs on failure
        if: failure()
        run: |
          podman-compose -f tests/integration/docker-compose.yml logs mock-2n
          podman-compose -f tests/integration/docker-compose.yml logs mock-2n-follower

      - name: Tear down services
        if: always()
        run: podman-compose -f tests/integration/docker-compose.yml down -v
