services:
  mock-2n:
    build:
      context: mock_2n
    ports:
      - "8888:8888"
    healthcheck:
      test: >
        python -c "import urllib.request; urllib.request.urlopen('http://localhost:8888/api/system/info')"
      interval: 5s
      timeout: 5s
      retries: 12

  homeassistant:
    image: homeassistant/home-assistant:stable
    volumes:
      - ./ha_config:/config
      - ../../custom_components:/config/custom_components:ro
    ports:
      - "8123:8123"
    environment:
      - TZ=UTC
    depends_on:
      mock-2n:
        condition: service_healthy
    healthcheck:
      # HA is ready when the onboarding endpoint responds
      test: >
        python -c "import urllib.request; urllib.request.urlopen('http://localhost:8123/api/onboarding')"
      interval: 10s
      timeout: 10s
      retries: 36        # up to 6 minutes for HA to start
      start_period: 20s
